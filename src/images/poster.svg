<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d6efd"></stop>
      <stop offset="100%" stop-color="#0dcaf0"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"></rect>

  <!-- Title -->
  <text x="50%" y="42%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="56" fill="white" font-weight="bold">
        Repotrans Demo
  </text>

  <!-- Subtitle -->
  <text x="50%" y="52%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="white">
        Loan Management System for Microfinance
  </text>

  <!-- Play Button -->
  <circle cx="640" cy="400" r="60" fill="white" opacity="0.9"></circle>
  <polygon points="620,370 620,430 690,400" fill="#0d6efd"></polygon>
</svg>